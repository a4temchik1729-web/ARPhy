<!DOCTYPE html>
<html>
  <head>
    <title>Physics AR Lab</title>
    <!-- Подключаем A-Frame и AR.js для работы дополненной реальности в браузере [1, 2] -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Окно характеристик в верхнем правом углу [1] */
      #info-window {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 200px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px;
        font-family: Arial, sans-serif;
        border-radius: 8px;
        z-index: 1000;
        pointer-events: none;
      }
      .label { font-size: 12px; color: #aaa; }
      .value { font-size: 16px; margin-bottom: 10px; }
      #animated-bar { width: 100%; height: 5px; background: #444; }
      #bar-fill { width: 60%; height: 100%; background: #00ff00; }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <!-- UI окно с характеристиками [1, 5] -->
    <div id="info-window">
      <div class="label">Объект:</div>
      <div class="value">Сфера (Круг)</div>
      <div class="label">Координаты:</div>
      <div id="coords" class="value">x: 0, y: 0.5, z: 0</div>
      <div class="label">Размеры [5]:</div>
      <div class="value">~52 см</div>
      <div id="animated-bar"><div id="bar-fill"></div></div>
    </div>

    <!-- AR сцена [2, 3] -->
    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false; facingMode: environment;'>
      
      <!-- Маркер. При наведении камеры на QR-код (тип Hiro) появится объект [3, 6] -->
      <a-marker preset="hiro">
        <!-- Физический объект: Сфера -->
        <a-sphere position="0 0.5 0" radius="0.5" color="#EF2D5E" shadow="receive: true"></a-sphere>
        
        <!-- Стрелка силы (пример вектора) [7] -->
        <a-entity id="force-arrow" 
                  geometry="primitive: cone; radiusBottom: 0.05; height: 0.5" 
                  material="color: yellow" 
                  position="0 1.2 0" 
                  rotation="0 0 180"></a-entity>
        
        <!-- Имитация солнца/источника света -->
        <a-entity light="type: directional; castShadow: true; intensity: 0.6" position="5 10 5"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
