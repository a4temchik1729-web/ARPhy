<!-- Подключаем библиотеки для AR прямо в браузере -->
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<body style="margin: 0; overflow: hidden;">
    <!-- UI-окно: будет обновляться "на лету" -->
    <div id="info" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #0f0; padding: 10px; z-index: 100; font-family: monospace;">
        СТАТУС: Поиск объекта...
    </div>

    <a-scene embedded arjs='sourceType: webcam; facingMode: environment;'>
        <!-- Маркер (QR или Hiro) — точка привязки для физики -->
        <a-marker preset="hiro" id="physics-object">
            <!-- Виртуальная стрелка (Вектор силы) -->
            <a-entity id="arrow" 
                      geometry="primitive: cone; radiusBottom: 0.05; height: 0.5" 
                      material="color: yellow" 
                      position="0 1 0" 
                      rotation="0 0 180"></a-entity>
            
            <!-- Описание характеристик прямо над объектом -->
            <a-text value="F = m*g" position="0 1.3 0" align="center" color="white"></a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#physics-object');
        const info = document.querySelector('#info');

        // Когда камера "поймала" объект
        marker.addEventListener('markerFound', () => {
            // Здесь срабатывает ваш "БАМ"
            info.innerHTML = "ОБЪЕКТ: Сфера<br>МАССА: 0.5 кг<br>СИЛА: 4.9 N<br>ОСВЕЩЕНИЕ: Анализ...";
            console.log("Объект распознан нейросетью");
        });
    </script>
</body>
